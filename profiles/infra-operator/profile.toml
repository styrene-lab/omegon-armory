[profile]
schema = "dev.styrene.omegon.profile.v1"
id = "dev.styrene.omegon.profile.infra-operator"
slug = "infra-operator"
name = "Infra Operator"
version = "1.0.0"
description = "Curated infrastructure operations stack for OCI artifacts, remote execution, GitOps-style changes, documentation, and defensive review."
category = "operations"
license = "MIT"
min_omegon = "0.21.0"

[defaults]
posture = "architect"
thinking_level = "medium"
max_turns = 50
persona = "systems-engineer"
tone = "concise"

[export]
default_format = "generic-markdown"
include_optional = false
include_native_notes = true

[[dependencies]]
kind = "persona"
id = "systems-engineer"
version = ">=1.0.0"
required = true
activate = "always"

[[dependencies]]
kind = "tone"
id = "concise"
version = ">=1.0.0"
required = true
activate = "always"

[[dependencies]]
kind = "skill"
id = "oci"
version = ">=1.0.0"
required = true
activate = "always"

[[dependencies]]
kind = "skill"
id = "security"
version = ">=1.0.0"
required = true
activate = "always"

[[dependencies]]
kind = "skill"
id = "git"
version = ">=1.0.0"
required = true
activate = "always"

[[dependencies]]
kind = "skill"
id = "vault"
version = ">=1.0.0"
required = false
activate = "auto"

[[dependencies]]
kind = "extension"
id = "shuttle"
version = ">=0.19"
required = false
activate = "manual"

[[dependencies]]
kind = "extension"
id = "flynt"
version = ">=0.15"
required = false
activate = "manual"
