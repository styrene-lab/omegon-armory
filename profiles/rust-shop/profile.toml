[profile]
id = "dev.styrene.omegon.profile.rust-shop"
slug = "rust-shop"
name = "Rust Shop"
version = "1.0.0"
description = "Curated Rust engineering stack for Cargo workspaces, library/application development, security review, and OCI-aware delivery."
category = "engineering"
license = "MIT"
min_omegon = "0.21.0"

[defaults]
posture = "architect"
thinking_level = "medium"
max_turns = 50
persona = "systems-engineer"
tone = "concise"

[[dependencies]]
kind = "persona"
id = "systems-engineer"
version = ">=1.0.0"
required = true
activate = "always"

[[dependencies]]
kind = "tone"
id = "concise"
version = ">=1.0.0"
required = true
activate = "always"

[[dependencies]]
kind = "skill"
id = "rust"
version = ">=1.0.0"
required = true
activate = "always"

[[dependencies]]
kind = "skill"
id = "security"
version = ">=1.0.0"
required = true
activate = "always"

[[dependencies]]
kind = "skill"
id = "git"
version = ">=1.0.0"
required = true
activate = "always"

[[dependencies]]
kind = "skill"
id = "openspec"
version = ">=1.0.0"
required = false
activate = "auto"

[[dependencies]]
kind = "skill"
id = "oci"
version = ">=1.0.0"
required = false
activate = "auto"

[[dependencies]]
kind = "extension"
id = "shuttle"
version = ">=0.19"
required = false
activate = "manual"
