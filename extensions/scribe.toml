[extension]
name = "scribe"
repo = "https://github.com/styrene-lab/scribe"
description = "Forge sync engine — bidirectional issue/task sync with GitHub, Forgejo, and GitLab. OAuth2 auth, git credential helper, optional codex vault integration."
category = "forge"
maintainer = "Black Meridian"
license = "MIT"
min_sdk = "0.15"
homepage = "https://github.com/styrene-lab/scribe"

[tools]
scribe_engagement_status = "Show current engagement config, repos, and forge connections"
scribe_list_issues = "List issues across repos in the active engagement"
scribe_create_issue = "Create an issue on the forge and corresponding codex task"
scribe_sync_issues = "Full pull/backfill/push sync cycle"
scribe_log = "Add a work log entry to the current engagement"
scribe_timeline = "Cross-repo timeline of work log entries"
scribe_forge_status = "Health and auth status of connected forges"

[cli]
setup = "scribe-agent setup — interactive first-time configuration"
auth = "scribe-agent auth github — OAuth2 device flow authentication"
credential_helper = "scribe-agent credential-helper — git HTTPS credential helper"
token_status = "scribe-agent token-status — show cached tokens"

[secrets]
required = []
optional = ["GITHUB_TOKEN", "SCRIBE_GITHUB_CLIENT_ID", "FORGEJO_TOKEN"]

[integrations]
codex = "Optional — writes task markdown files to codex vaults when codex_vault_root is configured"
omegon = "Loads as native extension via JSON-RPC. Secrets delivered via bootstrap_secrets."
git = "Provides credential helper for HTTPS push/pull"
