[extension]
name = "codex"
repo = "https://github.com/styrene-lab/codex"
description = "Vault document and task tools — search, read, write, kanban boards, knowledge graph. Markdown-native knowledge management."
category = "knowledge"
maintainer = "Black Meridian"
license = "MIT"
min_sdk = "0.15"
homepage = "https://github.com/styrene-lab/codex"
manifest_path = "crates/codex-agent/manifest.toml"

[tools]
search_documents = "Full-text search across vault documents"
list_documents = "List all vault documents (metadata)"
get_document = "Retrieve full document content by path"
create_document = "Create or overwrite a markdown document"
store_memory_fact = "Store a durable memory fact as a knowledge artifact"
get_backlinks = "List documents that link to a given document"
get_graph = "Get the full knowledge graph (nodes and edges)"
list_tasks = "List kanban tasks, filtered by board or column"
create_task = "Create a kanban task in a board column"
list_boards = "List all kanban boards"
create_board = "Create a default sprint board"
convert_to_design_node = "Convert a document into a structured design node"
list_design_nodes = "List all design nodes, optionally filtered by status"

[mind]
enabled = true
max_facts = 500
retention_days = 90
