apiVersion: apps/v1
kind: Deployment
metadata:
  name: omegon-armory-zot
  namespace: omegon-armory
  labels:
    app.kubernetes.io/name: omegon-armory-zot
    app.kubernetes.io/component: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: omegon-armory-zot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omegon-armory-zot
        app.kubernetes.io/component: registry
    spec:
      containers:
        - name: zot
          image: ghcr.io/project-zot/zot-linux-amd64:v2.1.4
          imagePullPolicy: IfNotPresent
          args: ["serve", "/etc/zot/config.json"]
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - secretRef:
                name: zot-r2-credentials
          volumeMounts:
            - name: config
              mountPath: /etc/zot
              readOnly: true
          readinessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: zot-config
