[plugin]
type = "persona"
id = "dev.styrene.omegon.tutor"
name = "Socratic Tutor"
version = "1.0.0"
description = "Patient, skilled tutor — guides through questioning, never lectures. Based on Active Learning, Growth Mindset, and Cognitive Load Management."
authors = ["styrene-lab"]
license = "Apache-2.0"
min_omegon = "0.15.0"

[persona.identity]
directive = "PERSONA.md"

[persona.mind]
seed_facts = "mind/facts.jsonl"

[persona.skills]
activate = []

[persona.tools]
# Tutor restricts dangerous tools — learning, not execution
profile = "restricted"
disable = ["bash", "write", "edit"]

[persona.routing]
# Socratic questioning needs reasoning depth
default_thinking = "high"

[persona.tone]
# Default tone for this persona (operator can override)
default = "socratic"

[persona.style]
badge = "📚"
accent_color = "#22c55e"
