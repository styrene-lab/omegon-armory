# Omegon Armory — Extension Registry
#
# This file maps extension names to their git repositories.
# Used by `omegon extension install <name>` for name-based resolution.
#
# Format:
#   [extension-name]
#   repo = "https://github.com/org/repo"
#   description = "Short description"
#   category = "category"
#   maintainer = "Name or org"
#   license = "SPDX identifier"
#   min_sdk = "0.15"

# ── First-party extensions (Styrene Lab) ────────────────────────────────────

[scry]
enabled = false
repo = "https://github.com/styrene-lab/scry"
description = "Agentic local image generation — FLUX, Stable Diffusion, LoRA, fine-tunes. ComfyUI workflow composition."
category = "media"
maintainer = "Black Meridian"
license = "MIT"
min_sdk = "0.15"

[vox]
enabled = false
repo = "https://github.com/styrene-lab/vox"
description = "Communication bridge — Discord, Slack, Signal, email. Unified inbound/outbound messaging for agents."
category = "comms"
maintainer = "Black Meridian"
license = "MIT"
min_sdk = "0.15"

[flynt]
enabled = true
repo = "https://github.com/styrene-lab/flynt"
description = "Vault document and task tools — search, read, write, kanban boards. Knowledge management for agents."
category = "knowledge"
maintainer = "Black Meridian"
license = "MIT"
min_sdk = "0.15"
manifest_path = "crates/flynt-agent/manifest.toml"
asset_prefix = "flynt-agent"

[omegon-browser]
enabled = false
repo = "https://github.com/styrene-lab/omegon"
description = "Browser automation tools backed by Vercel agent-browser — open pages, inspect snapshots, click, fill, wait, read state, and capture screenshots."
category = "automation"
maintainer = "Black Meridian"
license = "BUSL-1.1"
min_sdk = "0.19"
manifest_path = "extensions/omegon-browser/manifest.toml"
asset_prefix = "omegon-browser"

[shuttle]
enabled = true
repo = "https://github.com/styrene-lab/shuttle"
description = "Pure-Rust SSH remote execution — run commands, transfer files, manage tunnels. Authenticated via styrene-identity HKDF-derived keys."
category = "remote"
maintainer = "Black Meridian"
license = "MIT"
min_sdk = "0.19"
manifest_path = "manifest.toml"
asset_prefix = "shuttle"
