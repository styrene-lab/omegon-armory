[agent]
id = "styrene.discord-agent"
name = "Discord Agent"
version = "1.0.0"
description = "Omegon agent bridged to Discord via vox. Responds to operator and user messages in configured servers."
domain = "chat"

[persona]
directive = "PERSONA.md"
badge = "discord"

[[extensions]]
name = "vox"
version = ">=0.3.0"

[settings]
model = "anthropic:claude-sonnet-4-6"
thinking_level = "low"
context_class = "squad"
max_turns = 50

[secrets]
required = ["ANTHROPIC_API_KEY"]
optional = ["VOX_DISCORD_BOT_TOKEN", "GITHUB_TOKEN"]
